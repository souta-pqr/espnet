# Stage 2: Disfluency Detection Training with Contextual Block Conformer
# Same encoder architecture as Stage 1
encoder: contextual_block_conformer
encoder_conf:
    output_size: 256
    attention_heads: 4
    linear_units: 2048
    num_blocks: 12
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.0
    input_layer: conv2d
    normalize_before: true
    activation_type: swish
    macaron_style: true
    use_cnn_module: true
    cnn_module_kernel: 15
    block_size: 18
    hop_size: 3
    look_ahead: 3
    init_average: true
    ctx_pos_enc: true

# Same decoder configuration
decoder: transducer
decoder_conf:
    rnn_type: lstm
    num_layers: 1
    hidden_size: 512
    dropout: 0.1
    dropout_embed: 0.2

joint_net_conf:
    joint_space_size: 640

# Model configuration for Stage 2
model: asr_model_with_path
model_conf:
    ctc_weight: 0.0
    report_cer: true
    report_wer: true
    dysfl_weight: 1.0
    num_dysfl_classes: 4
    # Stage 2 specific
    training_stage: "disfluency"
    freeze_asr_components: true  # Freeze ASR components in Stage 2
    disfluency_joint_space_size: 320
    disfluency_weight: 1.0
    enable_viterbi_path: true
    # Additional disfluency parameters
    path_alignment_conf:
        axis_u_size: 4  # U軸: 各トークンのlogitスコア（0,1,2,3）
        axis_t_enable: true  # T軸: 時間軸
        use_monotonic_align: true

# Frontend (same as Stage 1)
frontend: default
frontend_conf:
    hop_length: 132

# Optimization for Stage 2
batch_type: numel
batch_bins: 800000  # Smaller batch size for disfluency training
accum_grad: 8
grad_clip: 5
patience: null
max_epoch: 30
best_model_criterion:
-   - valid
    - disfluency_acc
    - max
keep_nbest_models: 5

optim: adam
optim_conf:
    lr: 0.0001
    weight_decay: 0.000001
scheduler: exponentiallr
scheduler_conf:
    gamma: 0.95

# No specaugment for Stage 2
specaug: null

seed: 30